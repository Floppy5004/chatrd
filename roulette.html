<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouletteRD</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.1.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/simple-notify@1.0.4/dist/simple-notify.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/animate.css@4.1.1/animate.min.css">

    <link rel="stylesheet" href="css/roulette.css">
</head>
<body>
    <!--<div class="app" style="display: none;">-->
    <div class="app">
        <div class="spinner-wrapper">
            <div class="spinner-view" id="spinnerView">
                <div class="prize-label"></div>
                <div class="prize-name"></div>
                <div class="spinner-container" id="spinnerBox">
                    <div class="spinner-track" id="track"></div>
                    <div class="cl cl-l"></div>
                    <div class="cl cl-r"></div>
                    <div class="arr arr-t"></div>
                    <div class="arr arr-b"></div>
                    <div class="fade-l"></div>
                    <div class="fade-r"></div>
                </div>

                <div class="spinner-participants">
                    <i class="fa-solid fa-users"></i> <span>0</span>
                </div>
            </div>
            <div class="winner-view" id="winnerView">
                <div class="winner-label"></div>
                <div id="winnerAvatarBig" class="winner-avatar-big"></div>
                <div class="winner-name" id="winnerName"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/simple-notify@1.0.4/dist/simple-notify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@hiseb/confetti@2.1.0/dist/confetti.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@streamerbot/client@1.12.1/dist/streamerbot-client.min.js"></script>
    
    <script src="js/modules/twitch/module.js?nocache=26"></script>
    
    <script src="js/modules/youtube/module.js?nocache=26"></script>
    
    <script src="js/modules/tiktok/module.js?nocache=26"></script>
    <script src="js/modules/kick/module.js?nocache=26"></script>

    <script src="js/i18n.js"></script>
    <script src="js/sb.js"></script>
    <script src="js/roulette.js"></script>
</body>
</html>
