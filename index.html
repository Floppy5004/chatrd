<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouletteRD</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/animate.css@4.1.1/animate.min.css">

    <link rel="stylesheet" href="css/settings.css">
</head>

<body>
    <div id="container">
        <div class="wrapper">
            <div id="settings">
                <div class="title"><h1>RouletteRD</h1></div>

                
                <form>

                    <div class="platform" id="readme" style="text-align: center;" data-i18n-html="readme.text">
                        You can find the documentation and how to setup RouletteRD <a target="_blank" href="https://github.com/vortisrd/rouletterd/blob/main/README.md">right here</a>.
                    </div>


                    <div class="platform" id="streamerbot">

                        <div class="config">
                            <h2><img src="images/logo-streamerbot.png"> Streamer.bot</h2>

                            <div id="streamerBotStatus" class="platform-enable">
                                <small></small>
                                <label><i class="fa-solid fa-circle"></i></label>
                            </div>
                        </div>

                        <div class="setup">
                            <div class="config">
                                <label data-i18n="streamerbot.server">Server</label>
                                <input type="text" name="streamerBotServerAddress" value="127.0.0.1" class="avoid">
                            </div>
                            <div class="config">
                                <label data-i18n="streamerbot.port">Port</label>
                                <input type="text" name="streamerBotServerPort" value="8080" class="avoid">
                            </div>
                        </div>

                    </div>

                    <div class="platform" id="setup">
                        
                        <div class="config">
                            <h2><i class="fa-solid fa-wrench"></i> <span data-i18n="general.title">Setup</span></h2>
                        </div>

                        <div class="setup">
                        
                            <div class="config">
                                <label data-i18n-html="general.testingmode">Testing Mode<br><small>The Roulette will be populated with fake users<br> for testing purposes and <strong>it won't accept entries.</strong></small></label>
                                <label class="switch"><input type="checkbox" name="test" data-default="false"><span class="slider"></span></label>
                            </div>

                            <hr>

                            <div class="config">
                                <label>
                                    <span data-i18n="general.language">Language</span><br>
                                    <small data-i18n="general.language_hint">Set RouletteRD's language.</small>
                                </label>
                                <label>
                                    <select name="lang" id="i18n-locale-selector">
                                        <option value="de">Deutsch</option>
                                        <option value="en" selected>English</option>
                                        <option value="es-ES">Español</option>
                                        <option value="pt-BR">Português (Brasil)</option>
                                        <option value="pl">Polski</option>
                                        <option value="tl-PH">Filipino</option>
                                    </select>
                                </label>
                            </div>
                            
                            <hr>

                            <div class="config">
                                <label data-i18n="general.label">Label</label>
                                <input type="text" name="label" placeholder="eg: Roulette to">
                            </div>

                            <div class="config">
                                <label data-i18n-html="general.prize">Prize<br><small>Tell the users what's the prize is gonna be.</small></label>
                                <input type="text" name="prize" placeholder="eg: 12500 VBucks">
                            </div>

                            <div class="config">
                                <label data-i18n-html="general.positions">Roulette Position<br><small>Sets the vertical position of the Roulette.</small>
                                </label>
                                <label>
                                    <select name="position" id="roulettePosition">
                                        <option value="top" data-i18n="general.position.top">Top</option>
                                        <option value="middle" selected data-i18n-html="general.position.middle">Middle</option>
                                        <option value="bottom" data-i18n-html="general.position.bottom">Bottom</option>
                                    </select>
                                </label>
                            </div>
                            
                            <div class="config">
                                <label data-i18n-html="general.speed"></label>
                                <label>
                                    <input type="range" id="speed" name="speed" min="1" max="15" step="1" value="10">
                                    <br><em id="speed-value" class="slider-value">10</em>
                                </label>
                            </div>
                            
                            <div class="config">
                                <label data-i18n-html="general.duration">Duration<br><small>Sets how long the wheel will spin.</small></label>
                                <label>
                                    <input type="range" id="duration" name="duration" min="5000" max="60000" step="5000" value="30000">
                                    <br><em id="duration-value" class="duration-value">30s</em>
                                </label>
                            </div>

                            <div class="config">
                                <label data-i18n-html="general.command">Join Command<br><small>Command used to join the Roulette. </small></label>
                                <input type="text" name="joinCommand" value="!join">
                            </div>

                            <hr>
                                <div class="config">
                                    <label data-i18n-html="general.runaction">Run Action on Result<br><small>Runs the Streamer.bot action selected below when the winner is picked.</small></label>
                                    <label class="switch"><input type="checkbox" id="runAction" name="runAction" data-default="false"><span class="slider"></span></label>
                                </div>
                                <div class="config">
                                    <select name="streamerBotAction" id="streamerBotActions" disabled></select>
                                </div>
                                <div class="config">
                                    <label id="winnerMessage" style="display: none;" data-i18n-html="general.winner_message">THE RESULTS ARE IN!🔥 The winner is </label>
                                </div>
                            <hr>

                            <div class="config">
                                <label data-i18n-html="twitch.title">Twitch<br><small>Twitch chat can participate.</small></label>
                                <label class="switch"><input type="checkbox" name="enableTwitch" checked data-default="true"><span class="slider"></span></label>
                            </div>
                            <div class="config">
                                <label><i class="fa-solid fa-arrow-turn-up"></i> <span data-i18n="twitch.hint">Announce Winner on Twitch</span></label>
                                <label class="switch"><input type="checkbox" name="enableTwitchPost" data-default="false"><span class="slider"></span></label>
                            </div>
                            <div class="config">
                                <label data-i18n-html="youtube.title">YouTube<br><small>YouTube chat can participate.</small></label>
                                <label class="switch"><input type="checkbox" name="enableYoutube" checked data-default="true"><span class="slider"></span></label>
                            </div>
                            <div class="config">
                                <label><i class="fa-solid fa-arrow-turn-up"></i> <span data-i18n="youtube.hint">Announce Winner on YouTube</span></label>
                                <label class="switch"><input type="checkbox" name="enableYoutubePost" data-default="false"><span class="slider"></span></label>
                            </div>
                            <div class="config">
                                <label data-i18n-html="kick.title">Kick<br><small>Kick chat can participate.</small></label>
                                <label class="switch"><input type="checkbox" name="enableKick" checked data-default="true"><span class="slider"></span></label>
                            </div>
                            <div class="config">
                                <label><i class="fa-solid fa-arrow-turn-up"></i> <span data-i18n="kick.hint">Announce Winner on Kick</span></label>
                                <label class="switch"><input type="checkbox" name="enableKickPost" data-default="false"><span class="slider"></span></label>
                            </div>
                            <div class="config">
                                <label data-i18n-html="tiktok.title">TikTok<br><small>TikTok chat can participate.</small></label>
                                <label class="switch"><input type="checkbox" name="enableTiktok" checked data-default="true"><span class="slider"></span></label>
                            </div>
                            <div class="config">
                                <label><i class="fa-solid fa-arrow-turn-up"></i>  <span data-i18n="tiktok.hint">Announce Winner on TikTok</span></label>
                                <label class="switch"><input type="checkbox" name="enableTiktokPost" data-default="false"><span class="slider"></span></label>
                            </div>
                            <div class="config">
                                <small class="warning" data-i18n-html="tiktok.warning">
                                    <i class="fa-solid fa-circle-info"></i> To announce the winner over TikTok chat, you need to follow <strong><a target="_blank" href="https://github.com/vortisrd/rouletterd#-commands-supported-by-the-chat-field">these instructions</a>.</strong>
                                </small>
                            </div>
                        </div>
                    </div>






                </form>


            </div>
            <div id="preview">
                <iframe id="rouletterdpreview" src="" frameborder="0"></iframe>
            </div>
        </div>
        

                

    
        
        <footer>

            <div class="url-bar">
                <button onclick="spinRoulette()" id="spinRoulette" data-i18n-html="footer.spin"><i class="fa-solid fa-map-pin"></i> Spin</button>
                <button onclick="fireResetEvent()" id="resetRoulette" data-i18n-html="footer.reset"><i class="fa-solid fa-rotate-right"></i> Reset</button>
                <button onclick="copyUrl()" id="copyUrl"  data-i18n-html="footer.copy_url">Copy URL</button>
                
                <input type="text" id="outputUrl" placeholder="URL Here..." readonly="" class="avoid">
            </div>

            <p data-i18n-html="footer.made_by">Made with ❤️ by <strong>VortisRD</strong></p>
            
            <p>
                <a target="_blank" href="https://twitch.com/vortisrd"><i class="fa-brands fa-twitch"></i></a>
                <a target="_blank" href="https://youtube.com/@vortisrd"><i class="fa-brands fa-youtube"></i></a>
                <a target="_blank" href="https://tiktok.com/@vortisrd"><i class="fa-brands fa-tiktok"></i></a>
                <a target="_blank" href="https://kick.com/vortisrd">
                    <svg id="Layer_1" xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 800 800">
                        <polygon class="st0" points="336 111 336 239 401 239 401 175 465 175 465 111 657 111 657 303 593 303 593 367 529 367 529 432 593 432 593 496 657 496 657 689 465 689 465 624 401 624 401 560 336 560 336 689 143 689 143 111 336 111"/>
                    </svg>
                </a>
                <a target="_blank" href="https://x.com/vortisrd"><i class="fa-brands fa-x-twitter"></i></a>
                <a target="_blank" href="https://github.com/vortisrd"><i class="fa-brands fa-github"></i></a>
            </p>
        </footer>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/simple-notify@1.0.4/dist/simple-notify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@streamerbot/client@1.12.1/dist/streamerbot-client.min.js"></script>

    <!-- i18n deve ser carregado ANTES do settings.js -->
    <script src="js/i18n-settings.js"></script>
    <script src="js/settings.js"></script>
</body>
</html>
